<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翻页时钟倒计时</title>
    <style>
        :root {
            --bg: #f5f5f0;
            --card-bg: #e8e8e2;
            --card-top: #f0f0ea;
            --card-bottom: #e0e0da;
            --text: #1a1a1a;
            --subtle: #999;
            --accent: #1a1a1a;
            --shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
            --divider: rgba(0,0,0,0.15);
            --fold-shadow: rgba(0,0,0,0.25);
            --button-bg: #ffffff;
            --button-hover: #f0f0f0;
            --input-bg: #ffffff;
            --input-border: #ddd;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            position: relative;
            user-select: none;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .label-top {
            font-size: 0.85rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--subtle);
            margin-bottom: 2.5rem;
            font-weight: 500;
        }

        /* ========== 翻页时钟样式 ========== */
        .countdown {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: clamp(0.8rem, 2.5vw, 1.8rem);
            flex-wrap: wrap;
        }

        .flip-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
        }

        /* 翻页卡片容器 */
        .flip-card {
            position: relative;
            width: clamp(80px, 18vw, 140px);
            height: clamp(100px, 22vw, 180px);
            border-radius: 10px;
            box-shadow: var(--shadow);
            /* 内部包含上下两半和翻页元素 */
        }

        /* 静态上半部分 */
        .flip-top-static {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: var(--card-top);
            border-radius: 10px 10px 0 0;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
            z-index: 3;
            border-bottom: 1px solid var(--divider);
        }

        .flip-top-static .digit-text {
            font-size: clamp(3.5rem, 8vw, 7rem);
            font-weight: 700;
            font-family: "SF Mono", "JetBrains Mono", "Menlo", "Consolas", "PingFang SC", monospace;
            color: var(--text);
            line-height: 0.9;
            transform: translateY(45%);
        }

        /* 静态下半部分 */
        .flip-bottom-static {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: var(--card-bottom);
            border-radius: 0 0 10px 10px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            overflow: hidden;
            z-index: 3;
            border-top: 1px solid var(--divider);
        }

        .flip-bottom-static .digit-text {
            font-size: clamp(3.5rem, 8vw, 7rem);
            font-weight: 700;
            font-family: "SF Mono", "JetBrains Mono", "Menlo", "Consolas", "PingFang SC", monospace;
            color: var(--text);
            line-height: 0.9;
            transform: translateY(-45%);
        }

        /* 翻页上半部分（会翻下来的那片） */
        .flip-top-fold {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: var(--card-top);
            border-radius: 10px 10px 0 0;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
            z-index: 4;
            transform-origin: bottom center;
            transform: rotateX(0deg);
            border-bottom: 1px solid var(--divider);
            backface-visibility: hidden;
        }

        .flip-top-fold .digit-text {
            font-size: clamp(3.5rem, 8vw, 7rem);
            font-weight: 700;
            font-family: "SF Mono", "JetBrains Mono", "Menlo", "Consolas", "PingFang SC", monospace;
            color: var(--text);
            line-height: 0.9;
            transform: translateY(45%);
        }

        /* 翻页下半部分（翻下来后露出的新数字下半） */
        .flip-bottom-fold {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: var(--card-bottom);
            border-radius: 0 0 10px 10px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            overflow: hidden;
            z-index: 2;
            border-top: 1px solid var(--divider);
            backface-visibility: hidden;
        }

        .flip-bottom-fold .digit-text {
            font-size: clamp(3.5rem, 8vw, 7rem);
            font-weight: 700;
            font-family: "SF Mono", "JetBrains Mono", "Menlo", "Consolas", "PingFang SC", monospace;
            color: var(--text);
            line-height: 0.9;
            transform: translateY(-45%);
        }

        /* 翻页动画 */
        .flip-top-fold.animating {
            animation: foldDown 0.6s cubic-bezier(0.55, 0.06, 0.65, 0.35) forwards;
        }

        @keyframes foldDown {
            0% {
                transform: rotateX(0deg);
                box-shadow: none;
            }
            30% {
                box-shadow: 0 4px 12px var(--fold-shadow);
            }
            100% {
                transform: rotateX(-180deg);
                box-shadow: 0 6px 20px var(--fold-shadow);
            }
        }

        .flip-label {
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--subtle);
            font-weight: 500;
        }

        .flip-separator {
            font-size: clamp(3rem, 7vw, 6rem);
            font-weight: 200;
            color: #ccc;
            line-height: 1;
            margin-top: -0.1em;
            animation: blink-sep 2s ease-in-out infinite;
        }

        @keyframes blink-sep {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.2;
            }
        }

        /* ========== 设置面板 ========== */
        .settings-toggle {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--button-bg);
            border: none;
            color: var(--text);
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.2s;
            z-index: 200;
            box-shadow: var(--shadow);
        }

        .settings-toggle:hover {
            background: var(--button-hover);
            transform: rotate(30deg);
        }

        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.3);
            z-index: 250;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .settings-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .settings-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: #ffffff;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            z-index: 300;
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
            width: min(90vw, 400px);
        }

        .settings-panel.open {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .settings-panel h3 {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            letter-spacing: 0.04em;
            text-align: center;
            color: #1a1a1a;
        }

        .settings-panel label {
            display: block;
            font-size: 0.8rem;
            color: #999;
            margin-bottom: 0.4rem;
            letter-spacing: 0.04em;
        }

        .settings-panel input[type="datetime-local"] {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            border: 1px solid #ddd;
            background: #f9f9f9;
            color: #1a1a1a;
            font-size: 1rem;
            font-family: inherit;
            margin-bottom: 1.5rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .settings-panel input[type="datetime-local"]:focus {
            border-color: #aaa;
        }

        .settings-buttons {
            display: flex;
            gap: 0.8rem;
            justify-content: flex-end;
        }

        .settings-buttons button {
            padding: 0.7rem 1.4rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: inherit;
            letter-spacing: 0.04em;
            transition: background 0.2s, transform 0.1s;
        }

        .settings-buttons button:active {
            transform: scale(0.96);
        }

        .btn-cancel {
            background: transparent;
            color: #999;
            border: 1px solid #ddd !important;
        }

        .btn-cancel:hover {
            background: #f5f5f5;
        }

        .btn-save {
            background: #1a1a1a;
            color: #ffffff;
            font-weight: 500;
        }

        .btn-save:hover {
            background: #333;
        }

        .target-display {
            margin-top: 2.5rem;
            font-size: 0.85rem;
            color: var(--subtle);
            letter-spacing: 0.04em;
        }

        .target-display strong {
            color: var(--text);
            font-weight: 500;
        }

        /* ========== 音乐按钮 ========== */
        .music-toggle {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--button-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            transition: transform 0.2s, background 0.2s;
            z-index: 100;
            color: var(--text);
            box-shadow: var(--shadow);
        }

        .music-toggle:hover {
            background: var(--button-hover);
            transform: scale(1.08);
        }

        .music-toggle svg {
            width: 22px;
            height: 22px;
        }

        .music-toggle .icon-pause {
            display: none;
        }

        .music-toggle.playing .icon-play {
            display: none;
        }

        .music-toggle.playing .icon-pause {
            display: block;
        }

        .music-hint {
            position: fixed;
            bottom: 5.5rem;
            right: 2rem;
            background: #ffffff;
            color: #999;
            padding: 0.4rem 0.8rem;
            border-radius: 1rem;
            font-size: 0.7rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            white-space: nowrap;
            z-index: 101;
        }

        .music-hint.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* 暗色模式适配 */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1a1c;
                --card-bg: #2c2c30;
                --card-top: #323236;
                --card-bottom: #28282c;
                --text: #e8e8e6;
                --subtle: #7a7a78;
                --accent: #f0f0f0;
                --shadow: 0 2px 16px rgba(0, 0, 0, 0.3);
                --divider: rgba(255,255,255,0.1);
                --fold-shadow: rgba(0,0,0,0.5);
                --button-bg: #2c2c30;
                --button-hover: #3a3a40;
                --input-bg: #2c2c30;
                --input-border: #555;
            }
            .settings-panel {
                background: #2c2c30;
            }
            .settings-panel h3 {
                color: #e8e8e6;
            }
            .settings-panel label {
                color: #7a7a78;
            }
            .settings-panel input[type="datetime-local"] {
                background: #3a3a40;
                border-color: #555;
                color: #e8e8e6;
            }
            .btn-cancel {
                color: #7a7a78;
                border-color: #555 !important;
            }
            .btn-cancel:hover {
                background: #3a3a40;
            }
            .btn-save {
                background: #f0f0f0;
                color: #1a1a1a;
            }
            .btn-save:hover {
                background: #ddd;
            }
            .music-hint {
                background: #2c2c30;
                color: #7a7a78;
            }
        }

        @media (max-width: 480px) {
            .countdown {
                gap: 0.3rem;
            }
            .flip-card {
                width: 60px;
                height: 80px;
                border-radius: 6px;
            }
            .flip-top-static,
            .flip-bottom-static,
            .flip-top-fold,
            .flip-bottom-fold {
                border-radius: 0;
            }
            .flip-top-static,
            .flip-top-fold {
                border-radius: 6px 6px 0 0;
            }
            .flip-bottom-static,
            .flip-bottom-fold {
                border-radius: 0 0 6px 6px;
            }
            .flip-top-static .digit-text,
            .flip-top-fold .digit-text,
            .flip-bottom-static .digit-text,
            .flip-bottom-fold .digit-text {
                font-size: 2.5rem;
            }
            .flip-separator {
                font-size: 2rem;
            }
            .music-toggle {
                bottom: 1.5rem;
                right: 1.5rem;
                width: 44px;
                height: 44px;
            }
            .music-hint {
                bottom: 5rem;
                right: 1.5rem;
            }
            .settings-toggle {
                top: 1rem;
                right: 1rem;
                width: 36px;
                height: 36px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- 设置按钮 -->
    <button class="settings-toggle" id="settingsToggle" aria-label="设置倒计时" title="设置目标时间">⚙️</button>

    <!-- 设置面板遮罩 -->
    <div class="settings-overlay" id="settingsOverlay"></div>

    <!-- 设置面板 -->
    <div class="settings-panel" id="settingsPanel">
        <h3>设置倒计时目标时间</h3>
        <label for="targetInput">选择日期和时间：</label>
        <input type="datetime-local" id="targetInput">
        <div class="settings-buttons">
            <button class="btn-cancel" id="btnCancel">取消</button>
            <button class="btn-save" id="btnSave">保存</button>
        </div>
    </div>

    <!-- 主内容 -->
    <div class="container">
        <p class="label-top" id="labelTop">距离目标还有</p>
        <div class="countdown" id="countdownContainer">
            <!-- 由 JS 动态生成 -->
        </div>
        <p class="target-display" id="targetDisplay">
            目标：<strong id="targetText">--</strong>
        </p>
    </div>

    <!-- 音乐按钮 -->
    <button class="music-toggle" id="musicToggle" aria-label="播放/暂停背景音乐">
        <svg class="icon-play" viewBox="0 0 24 24" width="22" height="22">
            <polygon points="5 3 19 12 5 21 5 3" fill="currentColor" stroke="none"/>
        </svg>
        <svg class="icon-pause" viewBox="0 0 24 24" width="22" height="22">
            <rect x="6" y="4" width="4" height="16" fill="currentColor" stroke="none"/>
            <rect x="14" y="4" width="4" height="16" fill="currentColor" stroke="none"/>
        </svg>
    </button>
    <div class="music-hint" id="musicHint">点击播放音乐 ♪</div>

    <audio id="bgMusic" loop preload="auto">
        <source src="https://whitenoise-1309702382.cos.ap-guangzhou.myqcloud.com/whitenoise.mp3" type="audio/mpeg">
    </audio>

    <script>
        (function() {
            // ========== 目标时间管理 ==========
            const STORAGE_KEY = 'countdown_target_date';
            const DEFAULT_TARGET = '2026-06-28T00:00:00';

            function getTargetDate() {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const d = new Date(saved);
                    if (!isNaN(d.getTime())) return d;
                }
                return new Date(DEFAULT_TARGET);
            }

            function saveTargetDate(date) {
                localStorage.setItem(STORAGE_KEY, date.toISOString());
            }

            let targetDate = getTargetDate();

            // ========== DOM ==========
            const countdownContainer = document.getElementById('countdownContainer');
            const labelTop = document.getElementById('labelTop');
            const targetText = document.getElementById('targetText');
            const settingsToggle = document.getElementById('settingsToggle');
            const settingsPanel = document.getElementById('settingsPanel');
            const settingsOverlay = document.getElementById('settingsOverlay');
            const targetInput = document.getElementById('targetInput');
            const btnCancel = document.getElementById('btnCancel');
            const btnSave = document.getElementById('btnSave');
            const musicToggle = document.getElementById('musicToggle');
            const bgMusic = document.getElementById('bgMusic');
            const musicHint = document.getElementById('musicHint');

            // ========== 格式化 ==========
            function formatDateStr(date) {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                const h = String(date.getHours()).padStart(2, '0');
                const min = String(date.getMinutes()).padStart(2, '0');
                const s = String(date.getSeconds()).padStart(2, '0');
                return `${y}年${m}月${d}日 ${h}:${min}:${s}`;
            }

            function toDatetimeLocalString(date) {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                const h = String(date.getHours()).padStart(2, '0');
                const min = String(date.getMinutes()).padStart(2, '0');
                return `${y}-${m}-${d}T${h}:${min}`;
            }

            // ========== 构建翻页时钟 DOM ==========
            const units = [
                { id: 'days', label: '天' },
                { id: 'hours', label: '时' },
                { id: 'minutes', label: '分' },
                { id: 'seconds', label: '秒' },
            ];

            function buildCountdownHTML() {
                let html = '';
                units.forEach((unit, index) => {
                    if (index > 0) {
                        html += '<span class="flip-separator">:</span>';
                    }
                    html += `
                        <div class="flip-unit">
                            <div class="flip-card" id="flip-card-${unit.id}">
                                <div class="flip-top-static"><span class="digit-text" id="top-old-${unit.id}">00</span></div>
                                <div class="flip-bottom-static"><span class="digit-text" id="bottom-old-${unit.id}">00</span></div>
                                <div class="flip-top-fold"><span class="digit-text" id="fold-num-${unit.id}">00</span></div>
                                <div class="flip-bottom-fold"><span class="digit-text" id="bottom-new-${unit.id}">00</span></div>
                            </div>
                            <span class="flip-label">${unit.label}</span>
                        </div>
                    `;
                });
                countdownContainer.innerHTML = html;
            }

            buildCountdownHTML();

            // 缓存 DOM 引用
            const flipElements = {};
            units.forEach(u => {
                flipElements[u.id] = {
                    topOld: document.getElementById(`top-old-${u.id}`),
                    bottomOld: document.getElementById(`bottom-old-${u.id}`),
                    foldNum: document.getElementById(`fold-num-${u.id}`),
                    bottomNew: document.getElementById(`bottom-new-${u.id}`),
                    foldEl: document.querySelector(`#flip-card-${u.id} .flip-top-fold`),
                };
            });

            // ========== 翻页动画 ==========
            let prevValues = { days: '00', hours: '00', minutes: '00', seconds: '00' };
            let animating = { days: false, hours: false, minutes: false, seconds: false };

            function pad(n) {
                return String(n).padStart(2, '0');
            }

            function flipUnit(id, newValue) {
                if (animating[id]) return;
                if (prevValues[id] === newValue) return;

                animating[id] = true;
                const els = flipElements[id];

                // 更新静态下半部分为旧值（保持不变，动画期间可见）
                els.bottomOld.textContent = prevValues[id];

                // 更新翻页上半部分为旧值（这是要翻下去的那片）
                els.foldNum.textContent = prevValues[id];

                // 更新翻页下半部分为新值（翻下来后露出的）
                els.bottomNew.textContent = newValue;

                // 更新静态上半部分为新值（翻完后顶部显示新值）
                // 这个在动画结束后更新

                // 触发翻页动画
                const foldEl = els.foldEl;
                foldEl.classList.remove('animating');
                void foldEl.offsetWidth;
                foldEl.classList.add('animating');

                // 动画进行到一半时（上部翻到垂直），更新顶部静态数字为新值
                setTimeout(() => {
                    els.topOld.textContent = newValue;
                }, 300);

                // 动画结束后重置
                setTimeout(() => {
                    foldEl.classList.remove('animating');
                    els.topOld.textContent = newValue;
                    els.bottomOld.textContent = newValue;
                    els.foldNum.textContent = newValue;
                    animating[id] = false;
                }, 600);

                prevValues[id] = newValue;
            }

            // ========== 更新显示 ==========
            function updateTargetDisplay() {
                targetText.textContent = formatDateStr(targetDate);
            }

            function updateCountdown() {
                const now = new Date();
                const diff = targetDate - now;

                if (diff <= 0) {
                    ['days', 'hours', 'minutes', 'seconds'].forEach(id => flipUnit(id, '00'));
                    labelTop.textContent = '倒计时已结束';
                    return;
                }

                labelTop.textContent = '距离目标还有';
                const totalSeconds = Math.floor(diff / 1000);
                const days = Math.floor(totalSeconds / 86400);
                const hours = Math.floor((totalSeconds % 86400) / 3600);
                const minutes = Math.floor((totalSeconds % 3600) / 60);
                const seconds = totalSeconds % 60;

                flipUnit('days', pad(days));
                flipUnit('hours', pad(hours));
                flipUnit('minutes', pad(minutes));
                flipUnit('seconds', pad(seconds));
            }

            // ========== 设置面板 ==========
            function openSettings() {
                targetInput.value = toDatetimeLocalString(targetDate);
                settingsPanel.classList.add('open');
                settingsOverlay.classList.add('open');
            }

            function closeSettings() {
                settingsPanel.classList.remove('open');
                settingsOverlay.classList.remove('open');
            }

            function saveSettings() {
                const val = targetInput.value;
                if (!val) return;
                const newDate = new Date(val);
                if (isNaN(newDate.getTime())) return;

                targetDate = newDate;
                saveTargetDate(targetDate);
                updateTargetDisplay();
                prevValues = { days: '--', hours: '--', minutes: '--', seconds: '--' };
                updateCountdown();
                closeSettings();
            }

            settingsToggle.addEventListener('click', openSettings);
            settingsOverlay.addEventListener('click', closeSettings);
            btnCancel.addEventListener('click', closeSettings);
            btnSave.addEventListener('click', saveSettings);
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeSettings();
            });

            // ========== 音乐控制 ==========
            let hintTimer = null;
            function showHint(text, duration = 3000) {
                musicHint.textContent = text;
                musicHint.classList.add('show');
                if (hintTimer) clearTimeout(hintTimer);
                hintTimer = setTimeout(() => {
                    musicHint.classList.remove('show');
                }, duration);
            }

            setTimeout(() => showHint('点击播放音乐 ♪'), 1500);

            musicToggle.addEventListener('click', () => {
                if (bgMusic.paused) {
                    bgMusic.play().then(() => {
                        musicToggle.classList.add('playing');
                        showHint('正在播放 ♪', 1500);
                    }).catch(() => {
                        showHint('播放失败，请再点一次', 3000);
                    });
                } else {
                    bgMusic.pause();
                    musicToggle.classList.remove('playing');
                    showHint('已暂停', 1500);
                }
            });

            bgMusic.addEventListener('play', () => musicToggle.classList.add('playing'));
            bgMusic.addEventListener('pause', () => musicToggle.classList.remove('playing'));

            // ========== 初始化 ==========
            updateTargetDisplay();
            // 初始化时设置所有数字的初始值
            const now = new Date();
            const diff = targetDate - now;
            if (diff > 0) {
                const totalSeconds = Math.floor(diff / 1000);
                const d = pad(Math.floor(totalSeconds / 86400));
                const h = pad(Math.floor((totalSeconds % 86400) / 3600));
                const m = pad(Math.floor((totalSeconds % 3600) / 60));
                const s = pad(totalSeconds % 60);
                ['days', 'hours', 'minutes', 'seconds'].forEach(id => {
                    const els = flipElements[id];
                    let val;
                    switch(id) {
                        case 'days': val = d; break;
                        case 'hours': val = h; break;
                        case 'minutes': val = m; break;
                        case 'seconds': val = s; break;
                    }
                    els.topOld.textContent = val;
                    els.bottomOld.textContent = val;
                    els.foldNum.textContent = val;
                    els.bottomNew.textContent = val;
                    prevValues[id] = val;
                });
            }
            setTimeout(updateCountdown, 200);
            setInterval(updateCountdown, 1000);
        })();
    </script>
</body>
</html>
