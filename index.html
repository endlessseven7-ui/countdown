<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>倒计时</title>
    <style>
        :root {
            --bg: #f5f5f0;
            --text: #1a1a1a;
            --subtle: #999;
            --accent: #333;
            --card-bg: #ffffff;
            --shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            position: relative;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .label-top {
            font-size: 0.85rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--subtle);
            margin-bottom: 2rem;
            font-weight: 500;
            user-select: none;
        }

        .countdown {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(0.5rem, 2vw, 1.5rem);
            flex-wrap: wrap;
        }

        .time-block {
            background: var(--card-bg);
            border-radius: 20px;
            padding: clamp(1.2rem, 3vw, 2rem) clamp(1rem, 2.5vw, 1.8rem);
            min-width: clamp(70px, 16vw, 120px);
            box-shadow: var(--shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            user-select: none;
        }

        .time-block:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.10);
        }

        .number {
            font-size: clamp(2.8rem, 7vw, 5.5rem);
            font-weight: 300;
            line-height: 1;
            letter-spacing: -0.02em;
            color: var(--accent);
            font-variant-numeric: tabular-nums;
            font-family: "SF Mono", "JetBrains Mono", "Menlo", "Consolas", "PingFang SC", monospace;
        }

        .number span {
            display: inline-block;
            min-width: 0.55em;
            text-align: center;
            transition: transform 0.15s ease;
        }

        .number span.flip {
            transform: translateY(-4px);
            opacity: 0.7;
        }

        .unit {
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--subtle);
            margin-top: 0.5rem;
            font-weight: 500;
            user-select: none;
        }

        .separator {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 200;
            color: #ccc;
            align-self: flex-start;
            margin-top: clamp(0.6rem, 2vw, 1.2rem);
            user-select: none;
            animation: blink-sep 2s ease-in-out infinite;
        }

        @keyframes blink-sep {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.25;
            }
        }

        .target-info {
            margin-top: 2.5rem;
            font-size: 0.85rem;
            color: var(--subtle);
            letter-spacing: 0.04em;
            user-select: none;
        }

        .target-info strong {
            color: var(--text);
            font-weight: 500;
        }

        /* 音乐按钮样式 */
        .music-toggle {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--card-bg);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.3s;
            z-index: 100;
            color: var(--accent);
            position: relative;
        }

        .music-toggle:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.10);
        }

        /* 环形进度条 */
        .progress-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-90deg);
            width: 52px;
            height: 52px;
            pointer-events: none;
        }

        .progress-ring circle {
            fill: none;
            stroke: #ffa500;
            stroke-width: 3;
            stroke-dasharray: 163.36;
            stroke-dashoffset: 163.36;
            transition: stroke-dashoffset 0.3s ease;
        }

        .music-toggle svg {
            width: 22px;
            height: 22px;
            position: relative;
            z-index: 1;
        }

        .music-toggle .icon-pause {
            display: none;
        }

        .music-toggle.playing .icon-play {
            display: none;
        }

        .music-toggle.playing .icon-pause {
            display: block;
        }

        /* 音乐提示 */
        .music-hint {
            position: fixed;
            bottom: 5.5rem;
            right: 2rem;
            background: var(--card-bg);
            color: var(--subtle);
            padding: 0.4rem 0.8rem;
            border-radius: 1rem;
            font-size: 0.7rem;
            box-shadow: var(--shadow);
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }

        .music-hint.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* 暗色模式适配 */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1a1c;
                --text: #e8e8e6;
                --subtle: #7a7a78;
                --accent: #f0f0f0;
                --card-bg: #242426;
                --shadow: 0 2px 16px rgba(0, 0, 0, 0.30);
            }
            .separator {
                color: #444;
            }
            .time-block:hover {
                box-shadow: 0 6px 28px rgba(0, 0, 0, 0.45);
            }
            .music-toggle {
                box-shadow: 0 2px 16px rgba(0, 0, 0, 0.30);
            }
        }

        @media (max-width: 480px) {
            .countdown {
                gap: 0.4rem;
            }
            .time-block {
                border-radius: 14px;
                padding: 1rem 0.7rem;
                min-width: 58px;
            }
            .unit {
                font-size: 0.65rem;
                letter-spacing: 0.06em;
            }
            .separator {
                margin-top: 0.4rem;
                font-size: 1.6rem;
            }
            .music-toggle {
                bottom: 1.5rem;
                right: 1.5rem;
                width: 44px;
                height: 44px;
            }
            .music-hint {
                bottom: 5rem;
                right: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <p class="label-top">距离目标日期还有</p>
        <div class="countdown">
            <div class="time-block">
                <div class="number" id="days">00</div>
                <div class="unit">天</div>
            </div>
            <span class="separator">:</span>
            <div class="time-block">
                <div class="number" id="hours">00</div>
                <div class="unit">时</div>
            </div>
            <span class="separator">:</span>
            <div class="time-block">
                <div class="number" id="minutes">00</div>
                <div class="unit">分</div>
            </div>
            <span class="separator">:</span>
            <div class="time-block">
                <div class="number" id="seconds">00</div>
                <div class="unit">秒</div>
            </div>
        </div>
        <p class="target-info" id="targetDisplay">目标：<strong>2026年06月28日 00:00:00</strong></p>
    </div>

    <!-- 音乐提示 -->
    <div class="music-hint" id="musicHint">正在准备音乐...</div>

    <!-- 音乐切换按钮 -->
    <button class="music-toggle" id="musicToggle" aria-label="播放/暂停背景音乐" disabled>
        <!-- 环形进度条 -->
        <svg class="progress-ring" viewBox="0 0 52 52">
            <circle cx="26" cy="26" r="26" id="progressCircle"/>
        </svg>
        <!-- 播放图标 -->
        <svg class="icon-play" viewBox="0 0 24 24" width="22" height="22">
            <polygon points="5 3 19 12 5 21 5 3" fill="currentColor" stroke="none"/>
        </svg>
        <!-- 暂停图标 -->
        <svg class="icon-pause" viewBox="0 0 24 24" width="22" height="22">
            <rect x="6" y="4" width="4" height="16" fill="currentColor" stroke="none"/>
            <rect x="14" y="4" width="4" height="16" fill="currentColor" stroke="none"/>
        </svg>
    </button>

    <script>
        (function() {
            // ========== 目标日期：2026年6月28日 00:00:00 ==========
            const targetDate = new Date('2026-06-28T00:00:00');

            // ========== DOM 元素 ==========
            const targetDisplay = document.getElementById('targetDisplay');
            const musicToggle = document.getElementById('musicToggle');
            const musicHint = document.getElementById('musicHint');
            const progressCircle = document.getElementById('progressCircle');
            const circumference = 2 * Math.PI * 26; // 约163.36

            // 显示目标日期
            const formatDateStr = (date) => {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                const h = String(date.getHours()).padStart(2, '0');
                const min = String(date.getMinutes()).padStart(2, '0');
                const s = String(date.getSeconds()).padStart(2, '0');
                return `${y}年${m}月${d}日 ${h}:${min}:${s}`;
            };
            targetDisplay.innerHTML = `目标：<strong>${formatDateStr(targetDate)}</strong>`;

            // 存储上一次的数值
            let prevValues = { days: '', hours: '', minutes: '', seconds: '' };
            const pad = (n) => String(n).padStart(2, '0');

            const updateDisplay = (id, valueStr) => {
                const el = document.getElementById(id);
                if (prevValues[id] !== valueStr && prevValues[id] !== '') {
                    el.innerHTML = valueStr
                        .split('')
                        .map(ch => `<span class="flip">${ch}</span>`)
                        .join('');
                    setTimeout(() => {
                        el.innerHTML = valueStr
                            .split('')
                            .map(ch => `<span>${ch}</span>`)
                            .join('');
                    }, 150);
                } else if (prevValues[id] === '') {
                    el.innerHTML = valueStr
                        .split('')
                        .map(ch => `<span>${ch}</span>`)
                        .join('');
                }
                prevValues[id] = valueStr;
            };

            const updateCountdown = () => {
                const now = new Date();
                const diff = targetDate - now;

                if (diff <= 0) {
                    updateDisplay('days', '00');
                    updateDisplay('hours', '00');
                    updateDisplay('minutes', '00');
                    updateDisplay('seconds', '00');
                    document.querySelector('.label-top').textContent = '倒计时已结束';
                    return;
                }

                const totalSeconds = Math.floor(diff / 1000);
                const days = Math.floor(totalSeconds / 86400);
                const hours = Math.floor((totalSeconds % 86400) / 3600);
                const minutes = Math.floor((totalSeconds % 3600) / 60);
                const seconds = totalSeconds % 60;

                updateDisplay('days', pad(days));
                updateDisplay('hours', pad(hours));
                updateDisplay('minutes', pad(minutes));
                updateDisplay('seconds', pad(seconds));
            };

            updateCountdown();
            setInterval(updateCountdown, 1000);

            // ========== 音乐控制逻辑（先下载后播放） ==========
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            let audioBuffer = null;
            let sourceNode = null;
            let isPlaying = false;
            let startTime = 0;
            let pausedAt = 0;
            let hintTimer = null;

            const showHint = (text, duration = 3000) => {
                musicHint.textContent = text;
                musicHint.classList.add('show');
                if (hintTimer) clearTimeout(hintTimer);
                hintTimer = setTimeout(() => {
                    musicHint.classList.remove('show');
                }, duration);
            };

            const updateProgress = (percent) => {
                const offset = circumference - (percent / 100) * circumference;
                progressCircle.style.strokeDashoffset = offset;
            };

            // 下载音乐文件
           const downloadMusic = async () => {
    showHint('正在下载音乐...');
    updateProgress(0);
    
    try {
        // 使用国内能访问的代理
        const url = 'https://ghproxy.com/https://raw.githubusercontent.com/endlessseven7-ui/music/main/whitenoise.mp3';
        const response = await fetch(url);
        const contentLength = response.headers.get('content-length');
        const total = parseInt(contentLength, 10);
        
        const reader = response.body.getReader();
        const chunks = [];
        let received = 0;

        while(true) {
            const { done, value } = await reader.read();
            if (done) break;
            
            chunks.push(value);
            received += value.length;
            
            if (total) {
                const percent = Math.round((received / total) * 100);
                updateProgress(percent);
                showHint(`下载中 ${percent}%`);
            }
        }

        const blob = new Blob(chunks, { type: 'audio/mpeg' });
        const arrayBuffer = await blob.arrayBuffer();
        audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
        
        musicToggle.disabled = false;
        progressCircle.style.display = 'none';
        showHint('音乐就绪 ♪ 点击播放', 3000);
        
    } catch (err) {
        console.error('音乐下载失败:', err);
        showHint('音乐加载失败，请刷新重试', 5000);
    }
};

            // 播放音乐
            const playMusic = () => {
                if (!audioBuffer) return;
                
                sourceNode = audioContext.createBufferSource();
                sourceNode.buffer = audioBuffer;
                sourceNode.loop = true;
                sourceNode.connect(audioContext.destination);
                
                // 从暂停位置开始播放
                sourceNode.start(0, pausedAt);
                startTime = audioContext.currentTime - pausedAt;
                isPlaying = true;
                musicToggle.classList.add('playing');
                showHint('正在播放 ♪', 1500);
            };

            // 暂停音乐
            const pauseMusic = () => {
                if (sourceNode) {
                    pausedAt = audioContext.currentTime - startTime;
                    sourceNode.stop();
                    sourceNode = null;
                }
                isPlaying = false;
                musicToggle.classList.remove('playing');
                showHint('已暂停', 1500);
            };

            // 按钮点击事件
            musicToggle.addEventListener('click', () => {
                if (musicToggle.disabled) return;
                
                if (isPlaying) {
                    pauseMusic();
                } else {
                    playMusic();
                }
            });

            // 开始下载
            downloadMusic();

            // 页面卸载时清理
            window.addEventListener('beforeunload', () => {
                if (sourceNode) {
                    sourceNode.stop();
                }
                audioContext.close();
            });
        })();
    </script>
</body>
</html>
