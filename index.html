<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翻页时钟倒计时</title>
    <style>
        :root {
            --bg: #f5f5f0;
            --card-top-bg: #e8e8e2;
            --card-bottom-bg: #deded8;
            --text: #1a1a1a;
            --subtle: #999;
            --divider: rgba(0,0,0,0.12);
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --button-bg: #ffffff;
            --button-hover: #f0f0f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            position: relative;
            user-select: none;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .label-top {
            font-size: 0.85rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--subtle);
            margin-bottom: 2.5rem;
            font-weight: 500;
        }

        /* ========== 翻页时钟 ========== */
        .countdown {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: clamp(0.8rem, 2.5vw, 1.6rem);
            flex-wrap: wrap;
        }

        .flip-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.7rem;
        }

        /* 翻页卡片 - 包含所有层 */
        .flip-card {
            position: relative;
            width: clamp(85px, 18vw, 140px);
            height: clamp(110px, 23vw, 185px);
            border-radius: 10px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        /* ===== 静态上半层（始终显示当前数字的上半部分） ===== */
        .card-top-static {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: var(--card-top-bg);
            border-radius: 10px 10px 0 0;
            overflow: hidden;
            z-index: 3;
            border-bottom: 1px solid var(--divider);
        }
        .card-top-static .digit {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translate(-50%, 48%);
            font-size: clamp(3.8rem, 8.5vw, 7.5rem);
            font-weight: 700;
            font-family: "SF Mono", "JetBrains Mono", "Menlo", "Consolas", "PingFang SC", monospace;
            color: var(--text);
            line-height: 1;
            height: 1em;
            display: flex;
            align-items: flex-end;
        }

        /* ===== 静态下半层（始终显示当前数字的下半部分） ===== */
        .card-bottom-static {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: var(--card-bottom-bg);
            border-radius: 0 0 10px 10px;
            overflow: hidden;
            z-index: 1;
            border-top: 1px solid var(--divider);
        }
        .card-bottom-static .digit {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translate(-50%, -48%);
            font-size: clamp(3.8rem, 8.5vw, 7.5rem);
            font-weight: 700;
            font-family: "SF Mono", "JetBrains Mono", "Menlo", "Consolas", "PingFang SC", monospace;
            color: var(--text);
            line-height: 1;
            height: 1em;
            display: flex;
            align-items: flex-start;
        }

        /* ===== 翻页容器（位于上半层，执行3D翻转） ===== */
        .fold-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            z-index: 5;
            transform-origin: bottom center;
            transform: rotateX(0deg);
            transform-style: preserve-3d;
        }

        /* 翻页正面 - 旧数字的上半部分 */
        .fold-front {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--card-top-bg);
            border-radius: 10px 10px 0 0;
            overflow: hidden;
            backface-visibility: hidden;
            border-bottom: 1px solid var(--divider);
        }
        .fold-front .digit {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translate(-50%, 48%);
            font-size: clamp(3.8rem, 8.5vw, 7.5rem);
            font-weight: 700;
            font-family: "SF Mono", "JetBrains Mono", "Menlo", "Consolas", "PingFang SC", monospace;
            color: var(--text);
            line-height: 1;
            height: 1em;
            display: flex;
            align-items: flex-end;
        }

        /* 翻页背面 - 新数字的上半部分（翻转后可见） */
        .fold-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--card-top-bg);
            border-radius: 10px 10px 0 0;
            overflow: hidden;
            backface-visibility: hidden;
            transform: rotateX(180deg);
            border-bottom: 1px solid var(--divider);
        }
        .fold-back .digit {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translate(-50%, 48%) scaleY(-1);
            font-size: clamp(3.8rem, 8.5vw, 7.5rem);
            font-weight: 700;
            font-family: "SF Mono", "JetBrains Mono", "Menlo", "Consolas", "PingFang SC", monospace;
            color: var(--text);
            line-height: 1;
            height: 1em;
            display: flex;
            align-items: flex-end;
        }

        /* ===== 下半层新数字（翻页过程中露出的） ===== */
        .card-bottom-new {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: var(--card-bottom-bg);
            border-radius: 0 0 10px 10px;
            overflow: hidden;
            z-index: 0;
            border-top: 1px solid var(--divider);
        }
        .card-bottom-new .digit {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translate(-50%, -48%);
            font-size: clamp(3.8rem, 8.5vw, 7.5rem);
            font-weight: 700;
            font-family: "SF Mono", "JetBrains Mono", "Menlo", "Consolas", "PingFang SC", monospace;
            color: var(--text);
            line-height: 1;
            height: 1em;
            display: flex;
            align-items: flex-start;
        }

        /* 翻转动画 */
        .fold-wrapper.animating {
            animation: pageFold 0.7s cubic-bezier(0.35, 0.05, 0.55, 0.95) forwards;
        }

        @keyframes pageFold {
            0% {
                transform: rotateX(0deg);
                box-shadow: none;
            }
            20% {
                box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            }
            100% {
                transform: rotateX(-180deg);
                box-shadow: 0 12px 30px rgba(0,0,0,0.18);
            }
        }

        .flip-label {
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--subtle);
            font-weight: 500;
        }

        .flip-separator {
            font-size: clamp(3rem, 7vw, 6rem);
            font-weight: 200;
            color: #c5c5c0;
            line-height: 1;
            margin-top: -0.05em;
            animation: blink-sep 2s ease-in-out infinite;
        }

        @keyframes blink-sep {
            0%,100% { opacity: 1; }
            50% { opacity: 0.15; }
        }

        /* ========== 设置面板 ========== */
        .settings-toggle {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--button-bg);
            border: none;
            color: var(--text);
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.2s;
            z-index: 200;
            box-shadow: var(--shadow);
        }
        .settings-toggle:hover {
            background: var(--button-hover);
            transform: rotate(30deg);
        }
        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.25);
            z-index: 250;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .settings-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        .settings-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%) scale(0);
            background: #fff;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            z-index: 300;
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
            width: min(90vw,400px);
        }
        .settings-panel.open {
            transform: translate(-50%,-50%) scale(1);
            opacity: 1;
        }
        .settings-panel h3 {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            letter-spacing: 0.04em;
            text-align: center;
            color: #1a1a1a;
        }
        .settings-panel label {
            display: block;
            font-size: 0.8rem;
            color: #999;
            margin-bottom: .4rem;
        }
        .settings-panel input[type="datetime-local"] {
            width: 100%;
            padding: .8rem 1rem;
            border-radius: 10px;
            border: 1px solid #ddd;
            background: #f9f9f9;
            color: #1a1a1a;
            font-size: 1rem;
            font-family: inherit;
            margin-bottom: 1.5rem;
            outline: none;
        }
        .settings-buttons {
            display: flex;
            gap: .8rem;
            justify-content: flex-end;
        }
        .settings-buttons button {
            padding: .7rem 1.4rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: .85rem;
            font-family: inherit;
            letter-spacing: .04em;
        }
        .btn-cancel {
            background: transparent;
            color: #999;
            border: 1px solid #ddd !important;
        }
        .btn-save {
            background: #1a1a1a;
            color: #fff;
            font-weight: 500;
        }
        .target-display {
            margin-top: 2.5rem;
            font-size: .85rem;
            color: var(--subtle);
            letter-spacing: .04em;
        }
        .target-display strong {
            color: var(--text);
            font-weight: 500;
        }

        /* ========== 音乐按钮 ========== */
        .music-toggle {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--button-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            transition: transform 0.2s, background 0.2s;
            z-index: 100;
            color: var(--text);
            box-shadow: var(--shadow);
        }
        .music-toggle:hover {
            background: var(--button-hover);
            transform: scale(1.08);
        }
        .music-toggle svg { width: 22px; height: 22px; }
        .music-toggle .icon-pause { display: none; }
        .music-toggle.playing .icon-play { display: none; }
        .music-toggle.playing .icon-pause { display: block; }
        .music-hint {
            position: fixed;
            bottom: 5.5rem;
            right: 2rem;
            background: #fff;
            color: #999;
            padding: .4rem .8rem;
            border-radius: 1rem;
            font-size: .7rem;
            box-shadow: 0 2px 12px rgba(0,0,0,.1);
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            white-space: nowrap;
            z-index: 101;
        }
        .music-hint.show {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 480px) {
            .countdown { gap: 0.3rem; }
            .flip-card {
                width: 65px;
                height: 85px;
                border-radius: 6px;
            }
            .card-top-static,
            .fold-front,
            .fold-back { border-radius: 6px 6px 0 0; }
            .card-bottom-static,
            .card-bottom-new { border-radius: 0 0 6px 6px; }
            .card-top-static .digit,
            .fold-front .digit,
            .fold-back .digit,
            .card-bottom-static .digit,
            .card-bottom-new .digit {
                font-size: 2.8rem;
            }
            .flip-separator { font-size: 2rem; }
            .music-toggle {
                bottom: 1.5rem; right: 1.5rem;
                width: 44px; height: 44px;
            }
            .music-hint { bottom: 5rem; right: 1.5rem; }
            .settings-toggle {
                top: 1rem; right: 1rem;
                width: 36px; height: 36px;
                font-size: 1rem;
            }
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1a1c;
                --card-top-bg: #2c2c30;
                --card-bottom-bg: #242428;
                --text: #e8e8e6;
                --subtle: #7a7a78;
                --divider: rgba(255,255,255,0.1);
                --shadow: 0 2px 12px rgba(0,0,0,0.35);
                --button-bg: #2c2c30;
                --button-hover: #3a3a40;
            }
            .settings-panel {
                background: #2c2c30;
            }
            .settings-panel h3 { color: #e8e8e6; }
            .settings-panel label { color: #7a7a78; }
            .settings-panel input[type="datetime-local"] {
                background: #3a3a40;
                border-color: #555;
                color: #e8e8e6;
            }
            .btn-cancel { color: #7a7a78; border-color: #555 !important; }
            .btn-save { background: #f0f0f0; color: #1a1a1a; }
            .music-hint { background: #2c2c30; color: #7a7a78; }
            .flip-separator { color: #444; }
        }
    </style>
</head>
<body>

    <button class="settings-toggle" id="settingsToggle" title="设置目标时间">⚙️</button>
    <div class="settings-overlay" id="settingsOverlay"></div>
    <div class="settings-panel" id="settingsPanel">
        <h3>设置倒计时目标时间</h3>
        <label for="targetInput">选择日期和时间：</label>
        <input type="datetime-local" id="targetInput">
        <div class="settings-buttons">
            <button class="btn-cancel" id="btnCancel">取消</button>
            <button class="btn-save" id="btnSave">保存</button>
        </div>
    </div>

    <div class="container">
        <p class="label-top" id="labelTop">距离目标还有</p>
        <div class="countdown" id="countdownContainer"></div>
        <p class="target-display">目标：<strong id="targetText">--</strong></p>
    </div>

    <button class="music-toggle" id="musicToggle">
        <svg class="icon-play" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3" fill="currentColor"/></svg>
        <svg class="icon-pause" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16" fill="currentColor"/><rect x="14" y="4" width="4" height="16" fill="currentColor"/></svg>
    </button>
    <div class="music-hint" id="musicHint">点击播放音乐 ♪</div>

    <audio id="bgMusic" loop preload="auto">
        <source src="https://whitenoise-1309702382.cos.ap-guangzhou.myqcloud.com/whitenoise.mp3">
    </audio>

    <script>
        (function() {
            const STORAGE_KEY = 'countdown_target_date';
            const DEFAULT_TARGET = '2026-06-28T00:00:00';

            function getTargetDate() {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const d = new Date(saved);
                    if (!isNaN(d.getTime())) return d;
                }
                return new Date(DEFAULT_TARGET);
            }
            function saveTargetDate(date) {
                localStorage.setItem(STORAGE_KEY, date.toISOString());
            }
            let targetDate = getTargetDate();

            const countdownContainer = document.getElementById('countdownContainer');
            const labelTop = document.getElementById('labelTop');
            const targetText = document.getElementById('targetText');

            function formatDateStr(date) {
                const y = date.getFullYear();
                const m = String(date.getMonth()+1).padStart(2,'0');
                const d = String(date.getDate()).padStart(2,'0');
                const h = String(date.getHours()).padStart(2,'0');
                const min = String(date.getMinutes()).padStart(2,'0');
                return `${y}年${m}月${d}日 ${h}:${min}`;
            }
            function toDatetimeLocalString(date) {
                const y = date.getFullYear();
                const m = String(date.getMonth()+1).padStart(2,'0');
                const d = String(date.getDate()).padStart(2,'0');
                const h = String(date.getHours()).padStart(2,'0');
                const min = String(date.getMinutes()).padStart(2,'0');
                return `${y}-${m}-${d}T${h}:${min}`;
            }

            const units = [
                {id:'days',label:'天'},
                {id:'hours',label:'时'},
                {id:'minutes',label:'分'},
                {id:'seconds',label:'秒'}
            ];

            function buildHTML() {
                let html = '';
                units.forEach((u,i) => {
                    if(i>0) html += '<span class="flip-separator">:</span>';
                    html += `
                        <div class="flip-unit">
                            <div class="flip-card" id="card-${u.id}">
                                <div class="card-top-static"><span class="digit" id="top-old-${u.id}">00</span></div>
                                <div class="card-bottom-static"><span class="digit" id="bottom-old-${u.id}">00</span></div>
                                <div class="fold-wrapper" id="fold-${u.id}">
                                    <div class="fold-front"><span class="digit" id="fold-num-${u.id}">00</span></div>
                                    <div class="fold-back"><span class="digit" id="fold-back-${u.id}">00</span></div>
                                </div>
                                <div class="card-bottom-new"><span class="digit" id="bottom-new-${u.id}">00</span></div>
                            </div>
                            <span class="flip-label">${u.label}</span>
                        </div>`;
                });
                countdownContainer.innerHTML = html;
            }
            buildHTML();

            const els = {};
            units.forEach(u => {
                els[u.id] = {
                    topOld: document.getElementById(`top-old-${u.id}`),
                    bottomOld: document.getElementById(`bottom-old-${u.id}`),
                    foldNum: document.getElementById(`fold-num-${u.id}`),
                    foldBack: document.getElementById(`fold-back-${u.id}`),
                    bottomNew: document.getElementById(`bottom-new-${u.id}`),
                    foldWrapper: document.getElementById(`fold-${u.id}`)
                };
            });

            let prevValues = {days:'00',hours:'00',minutes:'00',seconds:'00'};
            const animating = {days:false,hours:false,minutes:false,seconds:false};
            const pad = n => String(n).padStart(2,'0');

            function flipUnit(id, newValue) {
                if(animating[id] || prevValues[id] === newValue) return;
                animating[id] = true;
                const e = els[id];

                e.topOld.textContent = prevValues[id];
                e.bottomOld.textContent = prevValues[id];
                e.foldNum.textContent = prevValues[id];     // 翻页正面 = 旧数字
                e.foldBack.textContent = newValue;          // 翻页背面 = 新数字
                e.bottomNew.textContent = newValue;         // 下半层新数字

                const wrapper = e.foldWrapper;
                wrapper.classList.remove('animating');
                void wrapper.offsetWidth;

                // 翻页中点更新顶部静态数字
                setTimeout(() => {
                    e.topOld.textContent = newValue;
                }, 340);

                wrapper.classList.add('animating');

                setTimeout(() => {
                    wrapper.classList.remove('animating');
                    e.topOld.textContent = newValue;
                    e.bottomOld.textContent = newValue;
                    e.foldNum.textContent = newValue;
                    e.bottomNew.textContent = newValue;
                    animating[id] = false;
                }, 700);

                prevValues[id] = newValue;
            }

            function updateTargetDisplay() {
                targetText.textContent = formatDateStr(targetDate);
            }

            function updateCountdown() {
                const now = new Date();
                const diff = targetDate - now;
                if(diff <= 0) {
                    ['days','hours','minutes','seconds'].forEach(id => flipUnit(id,'00'));
                    labelTop.textContent = '倒计时已结束';
                    return;
                }
                labelTop.textContent = '距离目标还有';
                const sec = Math.floor(diff/1000);
                flipUnit('days', pad(Math.floor(sec/86400)));
                flipUnit('hours', pad(Math.floor((sec%86400)/3600)));
                flipUnit('minutes', pad(Math.floor((sec%3600)/60)));
                flipUnit('seconds', pad(sec%60));
            }

            // 初始化所有数字
            function initDigits() {
                const now = new Date();
                const diff = targetDate - now;
                if(diff > 0) {
                    const sec = Math.floor(diff/1000);
                    const vals = {
                        days: pad(Math.floor(sec/86400)),
                        hours: pad(Math.floor((sec%86400)/3600)),
                        minutes: pad(Math.floor((sec%3600)/60)),
                        seconds: pad(sec%60)
                    };
                    units.forEach(u => {
                        const v = vals[u.id];
                        const e = els[u.id];
                        e.topOld.textContent = v;
                        e.bottomOld.textContent = v;
                        e.foldNum.textContent = v;
                        e.foldBack.textContent = v;
                        e.bottomNew.textContent = v;
                        prevValues[u.id] = v;
                    });
                }
            }

            // 设置面板
            const settingsToggle = document.getElementById('settingsToggle');
            const settingsPanel = document.getElementById('settingsPanel');
            const settingsOverlay = document.getElementById('settingsOverlay');
            const targetInput = document.getElementById('targetInput');
            const btnCancel = document.getElementById('btnCancel');
            const btnSave = document.getElementById('btnSave');

            function openSettings() {
                targetInput.value = toDatetimeLocalString(targetDate);
                settingsPanel.classList.add('open');
                settingsOverlay.classList.add('open');
            }
            function closeSettings() {
                settingsPanel.classList.remove('open');
                settingsOverlay.classList.remove('open');
            }
            function saveSettings() {
                const val = targetInput.value;
                if(!val) return;
                const d = new Date(val);
                if(isNaN(d.getTime())) return;
                targetDate = d;
                saveTargetDate(targetDate);
                updateTargetDisplay();
                prevValues = {days:'--',hours:'--',minutes:'--',seconds:'--'};
                initDigits();
                updateCountdown();
                closeSettings();
            }
            settingsToggle.addEventListener('click', openSettings);
            settingsOverlay.addEventListener('click', closeSettings);
            btnCancel.addEventListener('click', closeSettings);
            btnSave.addEventListener('click', saveSettings);
            document.addEventListener('keydown', e => { if(e.key==='Escape') closeSettings(); });

            // 音乐
            const musicToggle = document.getElementById('musicToggle');
            const bgMusic = document.getElementById('bgMusic');
            const musicHint = document.getElementById('musicHint');
            let hintTimer;
            function showHint(t,d=3000) {
                musicHint.textContent=t;
                musicHint.classList.add('show');
                clearTimeout(hintTimer);
                hintTimer=setTimeout(()=>musicHint.classList.remove('show'),d);
            }
            setTimeout(()=>showHint('点击播放音乐 ♪'),1500);
            musicToggle.addEventListener('click',()=>{
                if(bgMusic.paused) {
                    bgMusic.play().then(()=>{
                        musicToggle.classList.add('playing');
                        showHint('正在播放 ♪',1500);
                    }).catch(()=>showHint('播放失败，请再点一次',3000));
                } else {
                    bgMusic.pause();
                    musicToggle.classList.remove('playing');
                    showHint('已暂停',1500);
                }
            });
            bgMusic.addEventListener('play',()=>musicToggle.classList.add('playing'));
            bgMusic.addEventListener('pause',()=>musicToggle.classList.remove('playing'));

            // 启动
            updateTargetDisplay();
            initDigits();
            setTimeout(updateCountdown, 300);
            setInterval(updateCountdown, 1000);
        })();
    </script>
</body>
</html>
